	<head>

		<link href='/static/style/predict.css' rel='stylesheet'>

	</head>





    <body>

    <h1>Prediction: Result</h1>
    <a href="/predict/">Back</a>

    <h2>JOBID: {{ jobid }}</h2>
    <h3>STATUS: {{ out_info["status"] }}      <a href="/predict/job/{{ jobid }}">Refresh</a></h3>
    {% if out_info["status"] == "ok" %}
        <a href="{{ folder_url }}">Download Data</a>
        <a href="{{ prediction_url }}">Downlad Prediction</a>


        <button onclick="loadURL('{{prediction_url}}')">Change</button>
        <button onclick="loadURL('https://files.rcsb.org/download/1M2Z.cif')">RSCB</button>
            <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
        }
        #controls {
            display: flex;
            justify-content: center;
            width: 800px;
            margin-bottom: 10px;
            z-index: 1;
        }
        button {
            margin: 5px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
        }
        #viewer-container {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
            position: relative;
        }
    </style>
    <link rel="stylesheet" type="text/css" href="https://molstar.org/me/viewer/molstar.css" />
</head>
<body>
    <div id="controls">
        <button onclick="loadExample('cellpack-hiv1')">Load HIV-1 Example</button>
        <button onclick="loadExample('machineryoflife-tour')">Load Machinery of Life Tour</button>
        <button onclick="loadExample('petworld-synvesicle')">Load Synaptic Vesicle Example</button>
    </div>
    <div id="viewer-container">
        <div id="meso-viewer" style="position: relative; width: 100%; height: 400px;"></div>
    </div>

    <script src="https://molstar.org/me/viewer/molstar.js"></script>
    <script type="text/javascript">
        let mesoExplorer;

        function loadExample(example) {
            if (mesoExplorer) {
                mesoExplorer.loadExample(example);

            }
        }
        function loadURL(url) {
            if (mesoExplorer) {
                mesoExplorer.loadUrl(url);

            }
        }

        molstar.MesoscaleExplorer.create('meso-viewer', {
            layoutShowControls: false,
            viewportShowExpand: false,
            layoutIsExpanded: false,
            powerPreference: 'high-performance',
            graphicsMode: 'quality'
        }).then(me => {
            mesoExplorer = me;
            me.loadExample('cellpack-hiv1');  // Load the default example on page load

            window.addEventListener('unload', () => {
                me.dispose();
            });
        });
    </script>

    {% elif out_info["status"] == "failed" %}

    {% elif out_info["status"] == "pending" %}

    {% elif out_info["status"] == "running" %}

    {% endif %}
    </body>
</html>
